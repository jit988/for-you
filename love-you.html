<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Punam ✨</title>
    <!-- Romantic & Elegant Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(45deg, #ffdee9 0%, #b5fffc 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            overflow-y: auto;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Romantic Particles */
        .heart-bg {
            position: fixed;
            font-size: 24px;
            animation: floatUp 6s linear infinite;
            opacity: 0;
            z-index: 0;
            bottom: -50px;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg) scale(0.5); opacity: 0; }
            50% { opacity: 0.7; }
            100% { transform: translateY(-105vh) rotate(360deg) scale(1.2); opacity: 0; }
        }

        /* Main Glassmorphic Container */
        .container {
            width: 90%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 35px 25px;
            box-shadow: 0 8px 32px 0 rgba(255, 74, 122, 0.2),
                        inset 0 0 20px rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.4);
            text-align: center;
            z-index: 10;
            position: relative;
            transition: all 0.5s ease;
        }

        /* Romantic Soft Pink Glow Ring */
        .container::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 30px;
            background: linear-gradient(45deg, #ff4081, #ff80ab, #00e5ff);
            z-index: -1;
            filter: blur(10px);
            opacity: 0.4;
            animation: pulseGlow 4s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        /* Screen 1: Heart Box Intro */
        #screen1 {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .heart-box {
            font-size: 90px;
            cursor: pointer;
            animation: heartBeat 1.4s infinite cubic-bezier(0.25, 0.8, 0.25, 1);
            filter: drop-shadow(0 5px 15px rgba(244, 63, 94, 0.4));
            transition: transform 0.3s ease;
        }

        .heart-box:hover {
            transform: scale(1.15);
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            28% { transform: scale(1.12); }
            42% { transform: scale(1.02); }
            56% { transform: scale(1.16); }
            100% { transform: scale(1); }
        }

        .entry-text {
            margin-top: 25px;
            font-size: 1.2rem;
            color: #c2185b;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .hidden { display: none !important; }

        /* Step 2 & 3: Dramatic Animations */
        .surprise-text {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: #ff2a6d;
            text-shadow: 0 0 10px rgba(255, 42, 109, 0.3);
            animation: scaleReveal 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .sender-name {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: 5px;
            color: #b71c1c;
            text-shadow: 0 0 15px rgba(183, 28, 28, 0.2);
            animation: fadeZoom 1.2s ease forwards;
        }

        @keyframes scaleReveal {
            0% { transform: scale(0.3); opacity: 0; letter-spacing: -5px; }
            100% { transform: scale(1); opacity: 1; letter-spacing: 2px; }
        }

        @keyframes fadeZoom {
            0% { transform: scale(1.3); opacity: 0; filter: blur(5px); }
            100% { transform: scale(1); opacity: 1; filter: blur(0); }
        }

        /* Step 4: Typewriter Box Styles */
        .confession-box {
            text-align: left;
            font-size: 0.98rem;
            line-height: 1.7;
            color: #37474f;
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.5);
            padding: 20px;
            border-radius: 18px;
            border-left: 5px solid #ff4081;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.03);
            min-height: 150px;
            white-space: pre-wrap; /* Keeps layout linebreaks intact */
        }

        /* Simulated blinking typewriter cursor */
        .cursor::after {
            content: '✏️';
            animation: blink 0.8s infinite;
            font-size: 0.9rem;
            margin-left: 2px;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Step 5: Proposal Question */
        .question-text {
            font-size: 1.35rem;
            font-weight: 600;
            color: #d81b60;
            margin: 25px 0 15px 0;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.8s ease;
        }

        .question-text.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Decision Controls */
        .btn-group {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 20px;
            gap: 15px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.8s ease;
        }

        .btn-group.show {
            opacity: 1;
            transform: translateY(0);
        }

        .btn {
            padding: 14px 30px;
            font-size: 1.05rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            outline: none;
            flex: 1;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        .btn-yes {
            background: linear-gradient(45deg, #ff4081, #ff2a6d);
            color: white;
        }

        .btn-yes:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 7px 20px rgba(255, 42, 109, 0.4);
        }

        .btn-no {
            background: #eceff1;
            color: #607d8b;
        }
        
        .btn-no:hover {
            background: #e2e8f0;
        }

        /* Terminal Outcome Screens */
        .final-message {
            font-size: 1.35rem;
            color: #d81b60;
            font-weight: 600;
            line-height: 1.5;
            padding: 20px 10px;
            animation: elasticPopIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes elasticPopIn {
            0% { transform: scale(0.6); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Mobile Adjustments */
        @media (max-width: 400px) {
            .container { padding: 30px 18px; }
            .surprise-text { font-size: 2.8rem; }
            .sender-name { font-size: 2rem; }
            .confession-box { font-size: 0.92rem; padding: 15px; }
            .btn { padding: 12px 20px; font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <!-- Container for runtime generated falling romantic tokens -->
    <div id="heart-container"></div>

    <div class="container">
        <!-- STEP 1: Interactive Entry Portal -->
        <div id="screen1">
            <div class="heart-box" onclick="runProposalTimeline()">💝</div>
            <div class="entry-text">Tap to open, Punam... ✨</div>
        </div>

        <!-- Dynamic Stages View Layer -->
        <div id="main-content" class="hidden">
            <div id="surprise-layer" class="surprise-text hidden">SURPRISE! ✨</div>
            <div id="name-layer" class="sender-name hidden">BIPRAJIT</div>
            
            <div id="proposal-layer" class="hidden">
                <!-- JavaScript Typewriter Target Box -->
                <div id="typewriter-box" class="confession-box cursor"></div>
                
                <div id="question-box" class="question-text">
                    Will you be my life partner ❤️ 🧎🌹?
                </div>

                <div id="btn-group" class="btn-group">
                    <button class="btn btn-yes" onclick="handleYesClick()">Yes</button>
                    <button id="no-btn" class="btn btn-no" onclick="handleNoClick()">No</button>
                </div>
            </div>

            <!-- Resolution Dynamic View Target -->
            <div id="final-layer" class="final-message hidden"></div>
        </div>
    </div>

    <script>
        let noClicksCounter = 0;
        const originalProposalStr = "Will you be my life partner ❤️ 🧎🌹?";
        
        const confessionNarrative = "Ami jani na tomar mone ki cholche... ar hoyto ei kothata bola uchit kina tao jani na. 🙈\n\nKintu tomar shonge protidin kotha bolte bolte kokhon je tumi amar eto special hoye gecho, ami nijeyo bujhte parini.\n\nOnekbar nijeke bujhiyechi je beshi bhaba uchit na... kintu mon to shone na. 🥹\n\nMaybe eta ektu weird shonabe... but I think I'm obsessed with you.\n\nAr hoyto... I think I'm falling in love with you. ❤️";

        // Generate ambient shifting background decorative layout elements
        function launchParticleStream() {
            const container = document.getElementById('heart-container');
            const models = ['❤️', '💖', '✨', '🌸', '💕'];
            
            for (let i = 0; i < 12; i++) {
                setTimeout(() => {
                    const dynamicNode = document.createElement('div');
                    dynamicNode.classList.add('heart-bg');
                    dynamicNode.innerText = models[Math.floor(Math.random() * models.length)];
                    dynamicNode.style.left = Math.random() * 100 + 'vw';
                    dynamicNode.style.animationDuration = (Math.random() * 3 + 4) + 's';
                    dynamicNode.style.fontSize = (Math.random() * 18 + 16) + 'px';
                    container.appendChild(dynamicNode);
                    
                    setTimeout(() => { dynamicNode.remove(); }, 6500);
                }, i * 350);
            }
        }
        setInterval(launchParticleStream, 4000);
        launchParticleStream();

        // Execution Framework handling programmatic screen transitions
        function runProposalTimeline() {
            document.getElementById('screen1').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            
            // Stage 1: Reveal Surprise Header text element
            const surpriseUIElement = document.getElementById('surprise-layer');
            surpriseUIElement.classList.remove('hidden');
            
            // Stage 2: Hand off stage down to Name element asset
            setTimeout(() => {
                surpriseUIElement.classList.add('hidden');
                const nameUIElement = document.getElementById('name-layer');
                nameUIElement.classList.remove('hidden');
                
                // Stage 3: Initiate main proposal letter rendering logic
                setTimeout(() => {
                    nameUIElement.classList.add('hidden');
                    document.getElementById('proposal-layer').classList.remove('hidden');
                    executeLetterTypewriter();
                }, 2000);

            }, 2000);
        }

        // Custom typewriter typing driver logic
        function executeLetterTypewriter() {
            const targetContainer = document.getElementById('typewriter-box');
            let index = 0;
            
            function characterStep() {
                if (index < confessionNarrative.length) {
                    targetContainer.textContent += confessionNarrative.charAt(index);
                    index++;
                    // Speed adjustment variable (in milliseconds)
                    setTimeout(characterStep, 35);
                } else {
                    // Stripping terminal blinking cursor mark upon execution run wrap
                    targetContainer.classList.remove('cursor');
                    revealProposalControls();
                }
            }
            characterStep();
        }

        // Gradual soft fade-in element wrapper animations for decision buttons
        function revealProposalControls() {
            document.getElementById('question-box').classList.add('show');
            document.getElementById('btn-group').classList.add('show');
        }

        // Processing framework for positive selection matrix paths
        function handleYesClick() {
            document.getElementById('proposal-layer').classList.add('hidden');
            const outputMessageUI = document.getElementById('final-layer');
            outputMessageUI.innerHTML = "I always take care of you, I always Love U 🥰😘.";
            outputMessageUI.classList.remove('hidden');
            
            // Generate a festive burst of romantic particles
            for(let step = 0; step < 3; step++) { 
                launchParticleStream(); 
            }
        }

        // Logic conditional handling tree structure for alternate choice selections
        function handleNoClick() {
            noClicksCounter++;
            const contextualQuestionUI = document.getElementById('question-box');
            const negativeActionBtn = document.getElementById('no-btn');

            if (noClicksCounter === 1) {
                // First interaction fallback loop configuration logic
                contextualQuestionUI.innerHTML = "please 🥺 🥺, accept.";
                document.getElementById('btn-group').style.opacity = "0.3";
                negativeActionBtn.disabled = true;
                
                setTimeout(() => {
                    contextualQuestionUI.innerHTML = originalProposalStr;
                    document.getElementById('btn-group').style.opacity = "1";
                    negativeActionBtn.disabled = false;
                }, 2500);

            } else if (noClicksCounter >= 2) {
                // Terminal choice array closure loop configuration logic
                document.getElementById('btn-group').classList.add('hidden');
                contextualQuestionUI.classList.add('hidden');
                
                const outputMessageUI = document.getElementById('final-layer');
                outputMessageUI.innerHTML = "take a time, then decide. Please SUNA . ❤️";
                outputMessageUI.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
